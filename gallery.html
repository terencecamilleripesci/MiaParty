<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mia's Album 🎀</title>
<link rel="icon" href="assets/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Baloo 2',system-ui;background:#FFF5F9;color:#7A1B4C;margin:0;padding:18px;text-align:center}
h1{color:#BE185D;margin:10px 0 4px}
input{padding:14px;border-radius:14px;border:2.5px solid #F9A8D4;font:700 1.3rem 'Baloo 2';text-align:center;width:140px;letter-spacing:.3em}
button{padding:13px 26px;border-radius:999px;border:none;background:linear-gradient(135deg,#EC4899,#BE185D);color:#fff;font:800 1rem 'Baloo 2';cursor:pointer;margin:10px 6px}
.grid{margin-top:14px;text-align:left}
.guest{background:#fff;border:2px solid #FBCFE8;border-radius:18px;padding:14px;margin-bottom:16px}
.gname{cursor:pointer;margin-bottom:10px;transition:transform .12s}
.gname:active{transform:scale(.98)}
.ghead{display:flex;justify-content:space-between;align-items:center;gap:10px;color:#BE185D;font-size:1.05rem}
.mini{padding:8px 14px;margin:0;font-size:.8rem}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:10px}
.ph{position:relative}
.ph a{display:block;aspect-ratio:1;border-radius:12px;overflow:hidden;background:#FBCFE8}
.ph img{width:100%;height:100%;object-fit:cover}
.dl1{position:absolute;bottom:6px;right:6px;padding:5px 9px;margin:0;font-size:.75rem;border-radius:10px}
.grid a{display:block;aspect-ratio:1;border-radius:14px;overflow:hidden;background:#FBCFE8}
.grid img{width:100%;height:100%;object-fit:cover}
.meta{font-size:.8rem;color:#B94A85;font-weight:700}
#gal{display:none}
</style>
</head>
<body>
<h1>🎀 Mia's Album</h1>
<div id="lock">
  <p class="meta">Mummy's eyes only — enter the PIN</p>
  <input id="pin" inputmode="numeric" maxlength="4" placeholder="••••">
  <br><button onclick="open_()">OPEN ALBUM</button>
</div>
<div id="gal">
  <p class="meta"><span id="count">0</span> photos from Mia's photographers</p>
  <button onclick="dl()">⬇️ DOWNLOAD ALL (ZIP)</button>
  <button onclick="load()">🔄 Refresh</button>
  <div class="grid" id="grid"></div>
  <div id="selbar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#BE185D;color:#fff;
    padding:12px;z-index:50;font-weight:800">
    <span id="selN">0</span> selected
    <button onclick="dlSel()" style="background:#fff;color:#BE185D">⬇️ DOWNLOAD SELECTED</button>
    <button onclick="clearSel()" style="background:rgba(255,255,255,.25);color:#fff">Clear</button>
  </div>
  <div id="lb" style="display:none;position:fixed;inset:0;background:rgba(30,5,18,.95);z-index:60;
    flex-direction:column;align-items:center;justify-content:center;padding:16px">
    <img id="lbImg" style="max-width:96vw;max-height:74vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)">
    <div id="lbName" style="color:#F9A8D4;font-weight:700;margin:10px 0 4px;font-size:.85rem"></div>
    <div>
      <button onclick="lbNav(-1)">‹ Prev</button>
      <button onclick="dlOne(lbList[lbIdx].name)" style="background:#fff;color:#BE185D">⬇️ Download</button>
      <button onclick="lbSel()" id="lbSelBtn">☑️ Select</button>
      <button onclick="lbNav(1)">Next ›</button>
    </div>
    <button onclick="lbClose()" style="position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);color:#fff">✕</button>
  </div>
</div>
<script>
const API='https://raspberrypi.silverside-tench.ts.net:8443';
let PIN='';
function open_(){ PIN=document.getElementById('pin').value; load(); }
async function load(){
  try{
    const r=await fetch(API+'/list?pin='+PIN);
    if(!r.ok){ alert('Wrong PIN'); return; }
    const d=await r.json();
    document.getElementById('lock').style.display='none';
    document.getElementById('gal').style.display='block';
    document.getElementById('count').textContent=d.count;
    const by={};
    d.photos.forEach(p=>{ const g=p.name.split('_')[0]||'guest'; (by[g]=by[g]||[]).push(p); });
    groups=by;
    renderList();
  }catch(e){ alert('Album offline — try again shortly'); }
}
function dlGuest(g){ location.href=API+'/zip?pin='+PIN+'&guest='+encodeURIComponent(g); }
let groups={};
/* names-first navigation: list of photographers -> tap a name -> their photos (with Back) */
function renderList(){
  clearSel();
  const names=Object.keys(groups).sort();
  document.getElementById('grid').innerHTML = names.length ? names.map(g=>`
    <div class="guest gname" onclick="renderGuest('${g}')">
      <div class="ghead">
        <span>📸 <b>${g}</b> · ${groups[g].length} photo${groups[g].length>1?'s':''}</span>
        <span style="font-size:1.4rem;color:#F9A8D4">›</span>
      </div>
    </div>`).join('') : '<p class="meta">No photos yet — the party hasn\'t started! 🎈</p>';
}
function renderGuest(g){
  clearSel();
  document.getElementById('grid').innerHTML = `
    <div class="ghead" style="margin-bottom:12px">
      <button class="mini" onclick="renderList()">‹ Back to names</button>
      <span>📸 <b>${g}</b> · ${groups[g].length}</span>
      <button class="mini" onclick="dlGuest('${g}')">⬇️ ${g}'s zip</button>
    </div>
    <div class="ggrid">${groups[g].map(p=>`
      <div class="ph" data-name="${p.name}">
        <a href="javascript:void(0)" onclick="lbOpen('${g}','${p.name}')"><img loading="lazy" src="${API}/photos/${p.name}?pin=${PIN}" alt=""></a>
        <input type="checkbox" class="pick" onchange="selChange()" data-name="${p.name}"
          style="position:absolute;top:6px;left:6px;width:22px;height:22px;accent-color:#EC4899">
        <button class="dl1" onclick="dlOne('${p.name}')">⬇️</button>
      </div>`).join('')}</div>`;
}
function selChange(){
  const n=document.querySelectorAll('.pick:checked').length;
  document.getElementById('selN').textContent=n;
  document.getElementById('selbar').style.display=n?'block':'none';
}
function clearSel(){ document.querySelectorAll('.pick:checked').forEach(c=>c.checked=false); selChange(); }
async function dlSel(){
  const names=[...document.querySelectorAll('.pick:checked')].map(c=>c.dataset.name);
  if(!names.length) return;
  const r=await fetch(API+'/zipsel?pin='+PIN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({names})});
  if(!r.ok){ alert('Download failed'); return; }
  const b=await r.blob();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download='mia-selected.zip'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),8000);
}
let lbList=[], lbIdx=0;
function lbOpen(g,name){
  lbList=groups[g]||[]; lbIdx=lbList.findIndex(p=>p.name===name);
  lbShow();
  document.getElementById('lb').style.display='flex';
}
function lbShow(){
  const p=lbList[lbIdx]; if(!p) return;
  document.getElementById('lbImg').src=API+'/photos/'+p.name+'?pin='+PIN;
  document.getElementById('lbName').textContent=(lbIdx+1)+' / '+lbList.length+' · '+p.name.split('_')[0];
  const cb=document.querySelector('.pick[data-name="'+p.name+'"]');
  document.getElementById('lbSelBtn').textContent=(cb&&cb.checked)?'✅ Selected':'☑️ Select';
}
function lbNav(d){ lbIdx=(lbIdx+d+lbList.length)%lbList.length; lbShow(); }
function lbSel(){
  const p=lbList[lbIdx]; const cb=document.querySelector('.pick[data-name="'+p.name+'"]');
  if(cb){ cb.checked=!cb.checked; selChange(); lbShow(); }
}
function lbClose(){ document.getElementById('lb').style.display='none'; }
async function dlOne(name){
  try{
    const r=await fetch(API+'/photos/'+name+'?pin='+PIN);
    const b=await r.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b); a.download=name; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }catch(e){ alert('Download failed — try again'); }
}
function dl(){ location.href=API+'/zip?pin='+PIN; }
</script>
</body>
</html>
