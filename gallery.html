<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mia's Album 🎀</title>
<link rel="icon" href="assets/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Baloo 2',system-ui;background:#FFF5F9;color:#7A1B4C;margin:0;padding:18px;text-align:center}
h1{color:#BE185D;margin:10px 0 4px}
input{padding:14px;border-radius:14px;border:2.5px solid #F9A8D4;font:700 1.3rem 'Baloo 2';text-align:center;width:140px;letter-spacing:.3em}
button{padding:13px 26px;border-radius:999px;border:none;background:linear-gradient(135deg,#EC4899,#BE185D);color:#fff;font:800 1rem 'Baloo 2';cursor:pointer;margin:10px 6px}
.grid{margin-top:14px;text-align:left}
.guest{background:#fff;border:2px solid #FBCFE8;border-radius:18px;padding:14px;margin-bottom:16px}
.ghead{display:flex;justify-content:space-between;align-items:center;gap:10px;color:#BE185D;font-size:1.05rem}
.mini{padding:8px 14px;margin:0;font-size:.8rem}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:10px}
.ph{position:relative}
.ph a{display:block;aspect-ratio:1;border-radius:12px;overflow:hidden;background:#FBCFE8}
.ph img{width:100%;height:100%;object-fit:cover}
.dl1{position:absolute;bottom:6px;right:6px;padding:5px 9px;margin:0;font-size:.75rem;border-radius:10px}
.grid a{display:block;aspect-ratio:1;border-radius:14px;overflow:hidden;background:#FBCFE8}
.grid img{width:100%;height:100%;object-fit:cover}
.meta{font-size:.8rem;color:#B94A85;font-weight:700}
#gal{display:none}
</style>
</head>
<body>
<h1>🎀 Mia's Album</h1>
<div id="lock">
  <p class="meta">Mummy's eyes only — enter the PIN</p>
  <input id="pin" inputmode="numeric" maxlength="4" placeholder="••••">
  <br><button onclick="open_()">OPEN ALBUM</button>
</div>
<div id="gal">
  <p class="meta"><span id="count">0</span> photos from Mia's photographers</p>
  <button onclick="dl()">⬇️ DOWNLOAD ALL (ZIP)</button>
  <button onclick="load()">🔄 Refresh</button>
  <div class="grid" id="grid"></div>
</div>
<script>
const API='https://raspberrypi.silverside-tench.ts.net:8443';
let PIN='';
function open_(){ PIN=document.getElementById('pin').value; load(); }
async function load(){
  try{
    const r=await fetch(API+'/list?pin='+PIN);
    if(!r.ok){ alert('Wrong PIN'); return; }
    const d=await r.json();
    document.getElementById('lock').style.display='none';
    document.getElementById('gal').style.display='block';
    document.getElementById('count').textContent=d.count;
    const by={};
    d.photos.forEach(p=>{ const g=p.name.split('_')[0]||'guest'; (by[g]=by[g]||[]).push(p); });
    document.getElementById('grid').innerHTML = Object.keys(by).sort().map(g=>`
      <div class="guest">
        <div class="ghead">
          <span>📸 <b>${g}</b> · ${by[g].length} photo${by[g].length>1?'s':''}</span>
          <button class="mini" onclick="dlGuest('${g}')">⬇️ ${g}'s zip</button>
        </div>
        <div class="ggrid">${by[g].map(p=>`
          <div class="ph">
            <a href="${API}/photos/${p.name}?pin=${PIN}" target="_blank"><img loading="lazy" src="${API}/photos/${p.name}?pin=${PIN}" alt=""></a>
            <button class="dl1" onclick="dlOne('${p.name}')">⬇️</button>
          </div>`).join('')}</div>
      </div>`).join('');
  }catch(e){ alert('Album offline — try again shortly'); }
}
function dlGuest(g){ location.href=API+'/zip?pin='+PIN+'&guest='+encodeURIComponent(g); }
async function dlOne(name){
  try{
    const r=await fetch(API+'/photos/'+name+'?pin='+PIN);
    const b=await r.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b); a.download=name; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }catch(e){ alert('Download failed — try again'); }
}
function dl(){ location.href=API+'/zip?pin='+PIN; }
</script>
</body>
</html>
